# ==================== DATABASE CONFIGURATION ====================
# Use H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==================== JPA CONFIGURATION ====================
# Auto-create schema for each test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ==================== H2 CONSOLE (Optional) ====================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==================== JWT CONFIGURATION ====================
# Use test JWT secret (must be at least 256 bits)
jwt.secret=test-secret-key-for-testing-only-minimum-256-bits-required-for-hmac-sha256
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=86400000

# ==================== LOGGING ====================
logging.level.org.springframework.web=DEBUG
logging.level.com.taskmanagement=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE